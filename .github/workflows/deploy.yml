name: Deploy to Tencent CloudBase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase
        run: |
          tcb login --secret-id ${{ secrets.TCB_SECRET_ID }} --secret-key ${{ secrets.TCB_SECRET_KEY }}
          tcb hosting deploy index.html /Degen/index.html -e ${{ secrets.TCB_ENV_ID }}
          tcb hosting deploy help.html /Degen/help.html -e ${{ secrets.TCB_ENV_ID }}
